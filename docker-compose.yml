version: '3.8'
services:
  db:
    image: mysql:8.0
    volumes:
      - sakila-db-data:/var/lib/mysql
    networks:
      - sakila-network
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      MYSQL_HOST: db
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    networks:
      - sakila-network
    restart: on-failure:5

  db-admin:
    image: adminer:latest
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - sakila-network

  test-runner:
    build: .
    command: ["python", "-m", "pytest", "tests/", "-v"]
    profiles: ["test"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sakila-network
    environment:
      MYSQL_HOST: db

networks:
  sakila-network:
    driver: bridge

volumes:
  sakila-db-data: