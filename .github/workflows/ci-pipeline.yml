name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.9'
  IMAGE_NAME: sakila-app

jobs:
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install flake8
        run: pip install flake8
      - name: Run flake8
        run: flake8 . --max-line-length=120 --ignore=E501,W503,W504,E302,E303,E305,F401,W291,W293,W292,E128,E127,E126,E121,E123,E124,E125,E131 --exclude=.git,__pycache__,venv,sakila-db

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: admin
          MYSQL_DATABASE: sakila
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -padmin"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -r requirements.txt pytest
      - name: Wait for MySQL
        run: |
          until mysqladmin ping -h 127.0.0.1 -uroot -padmin --silent; do
            sleep 2
          done
      - name: Run tests
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_USER: root
          MYSQL_PASSWORD: admin
          MYSQL_DB: sakila
        run: pytest tests/ -v

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Build image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
      - name: Verify image
        run: docker images ${{ env.IMAGE_NAME }}
      - name: Smoke test
        run: |
          docker run -d --name smoke-test -p 5000:5000 -e MYSQL_HOST=localhost ${{ env.IMAGE_NAME }}:${{ github.sha }}
          sleep 10
          curl -f http://localhost:5000 || echo "App started"
          docker stop smoke-test

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Build image for scanning
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: '0'
          severity: HIGH,CRITICAL
          output: trivy-results.txt
      - name: Upload scan results
        uses: actions/upload-artifact@v3
        with:
          name: trivy-security-report
          path: trivy-results.txt
