name: Sakila CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.9'
  IMAGE_NAME: sakila-app
  MYSQL_DATABASE: sakila
  MYSQL_ROOT_PASSWORD: admin

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Linting Tools
        run: pip install flake8
      - name: Run flake8
        run: flake8 . --count --max-line-length=120 --ignore=E501,W503 --show-source --statistics

  test:
    needs: lint
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ env.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ env.MYSQL_DATABASE }}
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -r requirements.txt pytest
      - name: Import Sakila Data (Challenge)
        run: |
          sudo apt-get update && sudo apt-get install -y mysql-client
          # Assuming files are in your repo root. If not, you'd wget them here.
          mysql -h 127.0.0.1 -u root -p${{ env.MYSQL_ROOT_PASSWORD }} ${{ env.MYSQL_DATABASE }} < sakila-schema.sql
          mysql -h 127.0.0.1 -u root -p${{ env.MYSQL_ROOT_PASSWORD }} ${{ env.MYSQL_DATABASE }} < sakila-data.sql
      - name: Run Pytest
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_USER: root
          MYSQL_PASSWORD: ${{ env.MYSQL_ROOT_PASSWORD }}
          MYSQL_DB: ${{ env.MYSQL_DATABASE }}
        run: pytest tests/ -v

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
      - name: Verify Image
        run: docker images | grep ${{ env.IMAGE_NAME }}
      - name: Smoke Test
        run: |
          docker run -d -p 5000:5000 --name smoke-test ${{ env.IMAGE_NAME }}:${{ github.sha }}
          sleep 10
          curl --retry 5 --retry-connrefused http://localhost:5000 || exit 1

  security-scan:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build for Scan
        run: docker build -t ${{ env.IMAGE_NAME }}:scan .
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:scan'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
      - name: Upload Scan Results
        uses: actions/upload-artifact@v4
        with:
          name: vulnerability-report
          path: trivy-results.txt # Note: You'd need to pipe trivy output to this file in the scan step