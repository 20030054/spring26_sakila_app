name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.9"
  IMAGE_NAME: sakila-app

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Code quality check
  # ─────────────────────────────────────────────
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 . \
            --max-line-length=120 \
            --extend-ignore=E501,W503 \
            --count \
            --statistics

  # ─────────────────────────────────────────────
  # JOB 2: Unit tests with MySQL service container
  # ─────────────────────────────────────────────
  test:
    name: Test (pytest + MySQL)
    runs-on: ubuntu-latest
    needs: lint

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: sakila
          MYSQL_USER: sakila_user
          MYSQL_PASSWORD: sakila_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -prootpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: sakila
      DB_USER: sakila_user
      DB_PASSWORD: sakila_password

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Wait for MySQL to be healthy
        run: |
          echo "Waiting for MySQL..."
          for i in $(seq 1 30); do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -u root -prootpassword --silent 2>/dev/null; then
              echo "MySQL is ready!"
              break
            fi
            echo "Attempt $i/30 — retrying in 3s..."
            sleep 3
          done

      - name: Download Sakila database
        run: |
          curl -L -o /tmp/sakila-db.tar.gz \
            https://downloads.mysql.com/docs/sakila-db.tar.gz
          tar -xzf /tmp/sakila-db.tar.gz -C /tmp/

      - name: Import Sakila schema and data
        run: |
          mysql -h 127.0.0.1 -P 3306 -u root -prootpassword sakila \
            < /tmp/sakila-db/sakila-schema.sql
          mysql -h 127.0.0.1 -P 3306 -u root -prootpassword sakila \
            < /tmp/sakila-db/sakila-data.sql
          echo "Sakila database imported successfully."

      - name: Run pytest
        run: pytest tests/ -v

  # ─────────────────────────────────────────────
  # JOB 3: Docker image build & smoke test
  # ─────────────────────────────────────────────
  build:
    name: Build (Docker)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            .

      - name: Verify image was created
        run: docker images ${{ env.IMAGE_NAME }}

      - name: Smoke test — start container and check port 5000
        run: |
          docker run -d \
            --name sakila-smoke \
            -p 5000:5000 \
            -e FLASK_ENV=testing \
            -e DB_HOST=localhost \
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

          echo "Waiting for app to start..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:5000 > /dev/null 2>&1 || \
               wget -q --spider http://localhost:5000 > /dev/null 2>&1; then
              echo "App responded on port 5000 — smoke test passed!"
              break
            fi
            echo "Attempt $i/15 — retrying in 2s..."
            sleep 2
          done

          # Print container logs for debugging regardless
          docker logs sakila-smoke

          docker stop sakila-smoke
          docker rm sakila-smoke

  # ─────────────────────────────────────────────
  # JOB 4: Security scan (Trivy)
  # ─────────────────────────────────────────────
  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Rebuild image for scanning
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            .

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: "table"
          output: "trivy-report.txt"
          exit-code: "0"          # Never fail the pipeline on vulnerabilities
          ignore-unfixed: false
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH,MEDIUM,LOW"

      - name: Upload Trivy scan report as artifact
        uses: actions/upload-artifact@v4
        if: always()              # Upload even if scan step had issues
        with:
          name: trivy-security-report
          path: trivy-report.txt
          retention-days: 30