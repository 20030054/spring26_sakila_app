name: Sakila CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.9'
  IMAGE_NAME: sakila-app
  MYSQL_DATABASE: sakila
  MYSQL_ROOT_PASSWORD: admin

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install flake8
        run: pip install flake8
      - name: Run flake8
        run: flake8 . --count --max-line-length=120 --ignore=E501,W503 --show-source --statistics

  test:
    needs: lint
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ env.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ env.MYSQL_DATABASE }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping" 
          --health-interval=10s 
          --health-timeout=5s 
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -r requirements.txt pytest
      - name: Import Sakila Data (Challenge Element)
        run: |
          sudo apt-get update && sudo apt-get install -y default-mysql-client
          mysql -h 127.0.0.1 -u root -p${{ env.MYSQL_ROOT_PASSWORD }} ${{ env.MYSQL_DATABASE }} < sakila-schema.sql
          mysql -h 127.0.0.1 -u root -p${{ env.MYSQL_ROOT_PASSWORD }} ${{ env.MYSQL_DATABASE }} < sakila-data.sql
      - name: Run Pytest
        env:
          PYTHONPATH: .
          MYSQL_HOST: 127.0.0.1
          MYSQL_USER: root
          MYSQL_PASSWORD: ${{ env.MYSQL_ROOT_PASSWORD }}
          MYSQL_DB: ${{ env.MYSQL_DATABASE }}
          FLASK_SECRET_KEY: testing_secret
        run: pytest tests/ -v

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker Image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
      - name: Verify Image Exists
        run: docker images | grep ${{ env.IMAGE_NAME }}
      - name: Smoke Test
        run: |
          docker run -d -p 5000:5000 -e MYSQL_HOST=127.0.0.1 -e MYSQL_PASSWORD=admin -e MYSQL_USER=root -e MYSQL_DB=sakila -e FLASK_SECRET_KEY=test --name smoke-container ${{ env.IMAGE_NAME }}:${{ github.sha }}
          sleep 5
          curl --retry 5 --retry-connrefused http://localhost:5000 || exit 1

  security-scan:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Image for Scan
        run: docker build -t ${{ env.IMAGE_NAME }}:scan .
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:scan'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
          output: 'trivy-results.txt'
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-report
          path: trivy-results.txt