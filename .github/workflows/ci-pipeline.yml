name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: 3.9
  IMAGE_NAME: sakila-app

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install flake8
        run: pip install flake8

      - name: Run lint
        run: flake8 . --max-line-length=120 --ignore=E501,W503


  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: sakila
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Wait for MySQL
        run: |
          sudo apt-get update
          sudo apt-get install -y default-mysql-client

      - name: Import Sakila DB
        run: |
          mysql -h 127.0.0.1 -u root -proot sakila < sakila-db/sakila-schema.sql || true
          mysql -h 127.0.0.1 -u root -proot sakila < sakila-db/sakila-data.sql || true

      - name: Run tests
        run: pytest -v


  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: docker build -t sakila-app:${{ github.sha }} .

      - name: Verify image
        run: docker images

      - name: Run container
        run: |
          docker run -d -p 5000:5000 --name test-app sakila-app:${{ github.sha }}
          sleep 10
          curl http://localhost:5000 || true


  security-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Build image again
        run: docker build -t sakila-app:${{ github.sha }} .

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: sakila-app:${{ github.sha }}
          format: table
          exit-code: 0
