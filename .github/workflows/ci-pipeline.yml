name: CI/CD Pipeline

# Requirement 49: Trigger on push to main/develop, PR to main
on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

# Requirement 52: Concurrency group to cancel in-progress runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Requirement 50: Environment variables at the workflow level
env:
  PYTHON_VERSION: "3.9"
  IMAGE_NAME: "sakila-app"

jobs:
  # Job 1: Code Quality Check
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install flake8
        run: pip install flake8
        
      - name: Run flake8
        run: flake8 . --max-line-length=120 --ignore=E501,W503

  # Job 2: Run Unit Tests with MySQL Service Container
  test:
    runs-on: ubuntu-latest
    needs: lint  # Must pass lint first
    
    # Requirement 51: Use GitHub Actions service containers
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: admin
          MYSQL_DATABASE: sakila
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -padmin"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install Dependencies
        run: pip install -r requirements.txt
        
      - name: Import Sakila Schema and Data
        run: |
          # The runner talks to the service container via localhost/127.0.0.1
          mysql -h 127.0.0.1 -u root -padmin sakila < sakila-db/sakila-schema.sql
          mysql -h 127.0.0.1 -u root -padmin sakila < sakila-db/sakila-data.sql
          
      - name: Run Pytest
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_USER: root
          MYSQL_PASSWORD: admin
          MYSQL_DB: sakila
        run: python -m pytest -v

  # Job 3: Docker Image Build & Verification
  build:
    runs-on: ubuntu-latest
    needs: test  # Must pass test first
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          load: true # Required to test the image locally in the next steps
          
      - name: Verify Image Creation
        run: docker images | grep ${{ env.IMAGE_NAME }}
        
      - name: Smoke Test Container
        run: |
          # Start container in background
          docker run -d -p 5000:5000 --name smoke-test-app \
            -e MYSQL_HOST=dummy -e MYSQL_USER=dummy -e MYSQL_PASSWORD=dummy -e MYSQL_DB=dummy \
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          
          # Wait a few seconds for Flask to boot
          sleep 5 
          
          # Check if port 5000 responds
          curl --fail -I http://localhost:5000/ || exit 1
          
          # Cleanup
          docker rm -f smoke-test-app

  # Job 4: Image Security Scan
  security-scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      # Build again (Docker Buildx will use layer caching automatically)
      - name: Build Docker Image for Scan
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          load: true
          
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ github.sha }}'
          format: 'table'
          exit-code: '0' # Ensures it does NOT fail the pipeline
          ignore-unfixed: true
          vuln-type: 'os,library'
          output: 'trivy-results.txt'
          
      - name: Upload Scan Results Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-report
          path: trivy-results.txt