name: Deploy Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'app.py'
      - 'config.py'
      - 'templates/**'
      - 'static/**'
      - 'Dockerfile'
      - 'requirements.txt'
      - 'docker-compose.yml'

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Build staging image
        run: docker build -t sakila-app:staging-${{ github.sha }} .
      - name: Simulate staging deployment
        run: |
          echo "Deploying to staging environment..."
          echo "Image: sakila-app:staging-${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
      - name: Write Job Summary
        run: |
          echo "## Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** sakila-app:staging-${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** Deployed Successfully" >> $GITHUB_STEP_SUMMARY
      - name: Notify
        run: echo "Slack notification: Deployment to staging successful"

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Simulate production deployment
        run: |
          echo "Deploying to PRODUCTION environment..."
          echo "Image: sakila-app:${{ github.sha }}"
      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          body: |
            Production deployment from commit ${{ github.sha }}
            Branch: ${{ github.ref_name }}
          draft: false
          prerelease: false
      - name: Notify
        run: echo "Slack notification: Deployment to production successful"
