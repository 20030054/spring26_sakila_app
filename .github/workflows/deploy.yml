name: Deployment Workflow

on:
  push:
    branches:
      - main
    paths:
      - app.py
      - config.py
      - templates/**
      - static/**
      - Dockerfile
      - requirements.txt
      - docker-compose.yml
    paths-ignore:
      - README.md
      - docs/**
      - "*.md"
      - .gitignore

permissions:
  contents: write

env:
  IMAGE_NAME: sakila-app

jobs:
  deploy-staging:
    name: deploy-staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print staging environment details
        run: |
          echo "Environment: staging"
          echo "Branch: ${GITHUB_REF_NAME}"
          echo "Commit: ${GITHUB_SHA}"
          echo "Repository: ${GITHUB_REPOSITORY}"

      - name: Build Docker image with staging tag
        run: |
          docker build -t "${IMAGE_NAME}:staging-${GITHUB_SHA}" .
          docker images "${IMAGE_NAME}:staging-${GITHUB_SHA}"

      - name: Run staging container (simulated deployment)
        run: |
          docker run -d --name sakila-staging \
            -p 5000:5000 \
            -e MYSQL_HOST=dummy-host \
            -e MYSQL_USER=root \
            -e MYSQL_PASSWORD=admin \
            -e MYSQL_DB=sakila \
            "${IMAGE_NAME}:staging-${GITHUB_SHA}"
          docker ps --filter name=sakila-staging
          docker rm -f sakila-staging

      - name: Write staging deployment summary
        run: |
          {
            echo "## Staging Deployment Summary"
            echo "- Status: Successful"
            echo "- Environment: staging"
            echo "- Image Tag: ${IMAGE_NAME}:staging-${GITHUB_SHA}"
            echo "- Commit: ${GITHUB_SHA}"
            echo "- Triggered by: ${GITHUB_ACTOR}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Notify staging deployment
        run: echo "Slack notification: Deployment to staging successful"

  deploy-production:
    name: deploy-production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set release tag from current date
        id: tag
        run: echo "release_tag=v$(date +'%Y.%m.%d')" >> "$GITHUB_OUTPUT"

      - name: Simulate production deployment
        run: |
          echo "Deploying commit ${GITHUB_SHA} to production environment..."
          echo "Production deployment simulation completed successfully."

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: Release ${{ steps.tag.outputs.release_tag }}
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Notify production deployment
        run: echo "Slack notification: Deployment to production successful"
