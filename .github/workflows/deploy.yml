name: Deploy Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'app.py'
      - 'config.py'
      - 'templates/**'
      - 'static/**'
      - 'Dockerfile'
      - 'requirements.txt'
      - 'docker-compose.yml'

jobs:
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Print environment info
        run: |
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Deploying to: STAGING"
      - name: Simulate staging deploy
        run: |
          docker build -t sakila-app:staging .
          echo "Image built successfully for staging"
      - name: Write job summary
        run: |
          echo "## Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: Success" >> $GITHUB_STEP_SUMMARY
          echo "- **Time**: $(date)" >> $GITHUB_STEP_SUMMARY
      - name: Notify
        run: echo "Slack notification: Deployment to staging successful"

  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Simulate production deployment
        run: |
          echo "Deploying to PRODUCTION"
          echo "Version: ${{ github.sha }}"
      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v$(date +'%Y.%m.%d')
          release_name: Release $(date +'%Y.%m.%d')
          body: |
            Automated production release
            Commit: ${{ github.sha }}
          draft: false
          prerelease: false
      - name: Notify
        run: echo "Slack notification: Deployment to production successful"