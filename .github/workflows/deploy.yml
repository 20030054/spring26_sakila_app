name: Deploy Pipeline

on:
  push:
    branches: [main]
    paths:
      - "app.py"
      - "config.py"
      - "templates/**"
      - "static/**"
      - "Dockerfile"
      - "requirements.txt"
      - "docker-compose.yml"

permissions:
  contents: write

env:
  IMAGE_NAME: sakila-app

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print deployment info
        run: |
          echo '============================================'
          echo 'STAGING DEPLOYMENT'
          echo '============================================'
          echo "Branch    : ${{ github.ref_name }}"
          echo "Commit    : ${{ github.sha }}"
          echo "Triggered : ${{ github.actor }}"
          echo "Timestamp : $(date)"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build staging image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:staging .
          echo 'Staging image built successfully.'

      - name: Simulate staging deployment
        run: |
          echo 'Running deployment simulation...'
          docker run --rm \
            -e MYSQL_HOST=localhost \
            -e MYSQL_USER=root \
            -e MYSQL_PASSWORD=admin \
            -e MYSQL_DB=sakila \
            ${{ env.IMAGE_NAME }}:staging \
            python -c "print('Staging deployment verification complete.')" || true

      - name: Write deployment summary
        run: |
          echo '## Staging Deployment Summary' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '| Field | Value |' >> $GITHUB_STEP_SUMMARY
          echo '|-------|-------|' >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Success |" >> $GITHUB_STEP_SUMMARY
          echo "| Time | $(date) |" >> $GITHUB_STEP_SUMMARY

      - name: Notify staging deployment
        run: |
          echo 'Slack notification: Deployment to staging successful for commit ${{ github.sha }}'

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print production deployment info
        run: |
          echo '============================================'
          echo 'PRODUCTION DEPLOYMENT'
          echo '============================================'
          echo "Commit: ${{ github.sha }}"

      - name: Simulate production deployment
        run: |
          echo 'Deploying to production environment...'
          echo 'All pre-deployment checks passed.'
          echo 'Production deployment complete.'

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOTES="## Automated Production Release

          - Commit: ${{ github.sha }}
          - Branch: ${{ github.ref_name }}
          - Deployed by: ${{ github.actor }}
          - Timestamp: $(date)"

          gh release create "v${{ github.run_number }}" \
            --title "Release #${{ github.run_number }}" \
            --notes "$NOTES"

      - name: Write production summary
        run: |
          echo '## Production Deployment Summary' >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Status: Successfully deployed to production" >> $GITHUB_STEP_SUMMARY

      - name: Notify production deployment
        run: |
          echo 'Slack notification: Deployment to production successful for commit ${{ github.sha }}'
