name: Fixed CI Pipeline

on:
  push:
    branches: [main]          # Fix 1: must be a list

jobs:
  test:
    runs-on: ubuntu-latest    # Fix 2: 'ubuntu' is invalid
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'   # Fix 3: must be quoted string
      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install pytest
      - name: Run Tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest tests/ -v

  build:
    runs-on: ubuntu-latest
    needs: test               # Fix 4: build must depend on test
    steps:
      - uses: actions/checkout@v4
      - name: Build Image
        run: docker build -t myapp .

  deploy:
    runs-on: ubuntu-latest
    needs: build              # Fix 5: deploy should depend on build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy
        run: echo Deploying...
