name: Sakila Deployment Workflow

on:
  workflow_run:
    workflows: ["Sakila CI Pipeline"]
    types: [completed]
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'app.py'
      - 'config.py'
      - 'templates/**'
      - 'static/**'
      - 'Dockerfile'
      - 'requirements.txt'
      - 'docker-compose.yml'
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '*.md'
      - '.gitignore'

jobs:
  deploy-staging:
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t sakila-app:staging-${{ github.sha }} .
          docker tag sakila-app:staging-${{ github.sha }} sakila-app:staging

      - name: Deploy to Staging
        run: |
          echo "Deploying to STAGING environment..."
          echo "IMAGE_TAG: staging-${{ github.sha }}"
          docker-compose -f docker-compose.yml up -d
          echo "Staging deployment successful on port 5001"

      - name: Health Check
        run: sleep 10 && curl -f http://localhost:5001/health || exit 1

      - name: Generate Deployment Summary
        run: |
          echo "### Staging Deployment Summary 🚀" >> $GITHUB_STEP_SUMMARY
          echo "* **Environment:** Staging" >> $GITHUB_STEP_SUMMARY
          echo "* **Status:** Success" >> $GITHUB_STEP_SUMMARY

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Production
        run: |
          echo "Deploying to PRODUCTION environment..."
          docker build -t sakila-app:prod-${{ github.sha }} .
          # Add actual production deployment commands here

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: v2026.04.27-${{ github.run_number }}
          name: Release v2026.04.27
          body: "Production deployment - Build ${{ github.run_number }}"
          draft: false
          prerelease: false
